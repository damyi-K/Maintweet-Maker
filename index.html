<!DOCTYPE html>
<html lang="ko" data-ui-mode="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메인트 제작기</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700;800&family=Gowun+Dodum&family=Hi+Melody&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
    :root {
        /* 에디터 UI 테마 */
        --ui-bg: #f4f6f8;
        --ui-panel: #ffffff;
        --ui-border: #e2e8f0;
        --ui-text: #1e293b;
        --ui-text-dim: #64748b;
        --primary: #3b82f6;
        
        /* 렌더링 카드 변수 */
        --c-bg: #ffffff;
        --c-panel: #f8fafc;
        --c-text: #0f172a;
        --c-text-sub: #64748b;
        --c-accent: #3b82f6;
        --c-font: 'Pretendard', sans-serif;
    }

    [data-ui-mode="dark"] {
        --ui-bg: #0f172a;
        --ui-panel: #1e293b;
        --ui-border: #334155;
        --ui-text: #f1f5f9;
        --ui-text-dim: #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard', sans-serif; background: var(--ui-bg); color: var(--ui-text); height: 100vh; display: flex; overflow: hidden; }

    /* 레이아웃 구조 */
    .app-wrap { display: flex; width: 100%; height: 100%; }
    .sidebar { width: 440px; background: var(--ui-panel); border-right: 1px solid var(--ui-border); display: flex; flex-direction: column; z-index: 10; flex-shrink: 0; }
    
    .header { padding: 20px 25px; border-bottom: 1px solid var(--ui-border); display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-family: 'Outfit', sans-serif; font-size: 20px; font-weight: 900; color: var(--primary); }
    .ui-toggle { background: var(--ui-bg); border: 1px solid var(--ui-border); color: var(--ui-text); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 700; transition: 0.2s; }

    /* 탭 메뉴 */
    .tabs { display: flex; border-bottom: 1px solid var(--ui-border); overflow-x: auto; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab-btn { flex-shrink: 0; padding: 15px 16px; background: none; border: none; color: var(--ui-text-dim); font-weight: 700; cursor: pointer; border-bottom: 3px solid transparent; font-size: 13px; transition: 0.2s; }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

    .panels { flex: 1; overflow-y: auto; padding: 20px; }
    .panel { display: none; flex-direction: column; gap: 20px; }
    .panel.active { display: flex; }

    /* 입력 폼 */
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-group label { font-size: 12px; font-weight: 800; color: var(--ui-text-dim); }
    input, textarea, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--ui-border); background: var(--ui-bg); color: var(--ui-text); font-family: inherit; font-size: 13px; outline: none; transition: 0.2s; }
    input:focus, textarea:focus, select:focus { border-color: var(--primary); }
    .row { display: flex; gap: 10px; }

    /* 단추 (성향 등) */
    .tag-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .tag-btn { padding: 10px; border-radius: 6px; border: 1px solid var(--ui-border); background: var(--ui-bg); color: var(--ui-text-dim); cursor: pointer; font-size: 12px; font-weight: 700; text-align: center; }
    .tag-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

    /* 테마 및 컬러 피커 */
    .theme-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .theme-item { padding: 12px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; text-align: center; font-weight: 700; font-size: 12px; transition: 0.2s; }
    .theme-item.active { border-color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .color-picker-wrap { display: none; background: var(--ui-bg); padding: 15px; border-radius: 8px; border: 1px solid var(--ui-border); gap: 10px; flex-direction: column; margin-top: 10px; }
    .color-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: 700; }
    .color-row input[type="color"] { width: 35px; height: 35px; padding: 0; border: none; border-radius: 4px; cursor: pointer; }

    /* 아이템 에디터 */
    .editor-item { background: var(--ui-bg); padding: 15px; border-radius: 8px; border: 1px solid var(--ui-border); position: relative; display: flex; flex-direction: column; gap: 8px; }
    .remove-btn { position: absolute; top: 10px; right: 10px; border-radius: 4px; width: 24px; height: 24px; border: none; background: #ef4444; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; }

    /* 저장 버튼 */
    .btn-primary { margin: 20px; padding: 16px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: 800; font-size: 15px; cursor: pointer; transition: 0.2s; }
    .btn-primary:hover { background: #2563eb; }

    /* 미리보기 캔버스 영역 */
    .preview-wrap { flex: 1; background: #e2e8f0; overflow-y: auto; padding: 40px; display: flex; justify-content: center; align-items: flex-start; position: relative; }
    
    /* -------------------------------------
       카드 실물 디자인
       ------------------------------------- */
    #render-target {
        width: 800px;
        background: var(--c-bg);
        color: var(--c-text);
        font-family: var(--c-font);
        border-radius: 16px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: hidden; 
        transition: width 0.3s;
        image-rendering: high-quality;
    }

    #render-target * { word-break: break-word; overflow-wrap: break-word; }

    /* 레이아웃 프리셋: 세로형 */
    #render-target.layout-portrait { width: 540px; }
    #render-target.layout-portrait .c-list-grid { grid-template-columns: 1fr; }
    #render-target.layout-portrait .c-profile-row { flex-direction: column; align-items: flex-start; gap: 15px; margin-top: -30px; }
    #render-target.layout-portrait .c-profile-info { margin-top: 10px; }

    .c-content-wrap { position: relative; z-index: 1; display: flex; flex-direction: column; }

    /* 상단 배너 */
    .c-banner { width: 100%; height: 180px; background-color: var(--c-panel); background-size: cover; background-position: center; opacity: 0.9; position: relative; z-index: 0; }

    /* 프로필 영역 및 둥근사각 프레임 (기본) */
    .c-profile-row { display: flex; padding: 0 40px; margin-top: -50px; align-items: flex-start; gap: 25px; margin-bottom: 25px; position: relative; z-index: 10; }
    .c-pfp-wrapper { width: 130px; height: 130px; border-radius: 12px; background-color: var(--c-panel); background-size: cover; background-position: center; border: 6px solid var(--c-bg); flex-shrink: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: all 0.3s; }
    
    /* 프로필 프레임 선택 효과 */
    .c-pfp-wrapper.frame-circle { border-radius: 50%; }
    .c-pfp-wrapper.frame-polaroid { border-radius: 2px; border: 6px solid white; border-bottom-width: 28px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

    .c-profile-info { margin-top: 60px; flex: 1; padding-bottom: 0; }
    .c-name { font-size: 28px; font-weight: 900; margin-bottom: 4px; letter-spacing: -0.5px; }
    .c-id { font-family: 'Outfit', sans-serif; font-size: 15px; color: var(--c-accent); font-weight: 700; }

    /* 본문 패딩 */
    .c-body { padding: 20px 40px 40px 40px; display: flex; flex-direction: column; gap: 30px; }

    /* 배지 */
    .c-badges { display: flex; flex-wrap: wrap; gap: 8px; }
    .c-badge { background: var(--c-panel); padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: 800; color: var(--c-text); border: 1px solid rgba(0,0,0,0.05); }

    /* 자기소개 */
    .c-bio-clean { font-size: 15px; line-height: 1.7; white-space: pre-wrap; color: var(--c-text); border-left: 4px solid var(--c-accent); padding-left: 15px; }

    /* 지뢰 란 */
    .c-mine-box { background: rgba(239, 68, 68, 0.05); color: #ef4444; border-left: 4px solid #ef4444; padding: 8px 12px; border-radius: 6px; font-size: 13px; line-height: 1.4; white-space: pre-wrap; font-weight: 600; width: fit-content; margin-bottom: 5px; }
    .c-mine-title { font-size: 11px; font-weight: 900; color: #ef4444; margin-bottom: 2px; text-transform: uppercase; }
    #out-mine { margin: 0; padding: 0; }

    /* 성향 / 커뮤 태그 */
    .c-props-sec { display: flex; flex-direction: column; gap: 10px; }
    .c-sec-label { font-size: 13px; font-weight: 900; color: var(--c-accent); text-transform: uppercase; letter-spacing: 1px; }
    .c-tags-wrap { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
    .c-tag { background: var(--c-accent); color: #fff; padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: 700; }
    .c-tag.comm { background: var(--c-text); } 

    /* 커뮤 주의사항 텍스트 */
    .c-comm-notice { font-size: 14px; line-height: 1.6; white-space: pre-wrap; color: var(--c-text-sub); margin-bottom: 10px; padding: 10px; background: var(--c-panel); border-radius: 8px; border: 1px dashed rgba(0,0,0,0.1); }

    /* 섹션 제목 */
    .c-section-title { font-size: 18px; font-weight: 900; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }

    /* 커스텀 구분선 처리 */
    .c-divider { border: none; margin: 15px 0; text-align: center; display: flex; align-items: center; justify-content: center; }
    .div-solid { height: 1px; background: rgba(0,0,0,0.1); width: 100%; }
    .div-dashed { border-top: 2px dashed rgba(0,0,0,0.15); width: 100%; height: 0; }
    .div-icon::before { content: '✦ ✦ ✦'; color: var(--c-accent); font-size: 14px; opacity: 0.6; letter-spacing: 10px; }
    .div-wave::before { content: '〰〰〰〰〰'; color: var(--c-accent); font-size: 16px; opacity: 0.4; letter-spacing: 2px; }

    /* 리스트 그리드 */
    .c-list-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 15px; align-items: stretch; }
    
    /* 장르 아이템 (이미지 비율 3:4 적용) */
    .c-genre-item { background: var(--c-panel); padding: 15px; border-radius: 10px; display: flex; gap: 15px; align-items: flex-start; height: 100%; box-sizing: border-box; }
    .c-genre-img-box { width: 80px; aspect-ratio: 3 / 4; border-radius: 8px; background-color: var(--c-bg); background-size: cover; background-position: center; flex-shrink: 0; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .c-genre-info { flex: 1; display: flex; flex-direction: column; gap: 4px; overflow: hidden; margin-top: 2px; }
    .c-genre-name { font-size: 16px; font-weight: 800; line-height: 1.4; }
    .c-genre-sub { font-size: 13px; color: var(--c-text-sub); font-weight: 600; line-height: 1.5; }

    /* 드림 아이템 (배경 투명도를 0.4로 상향 적용) */
    .c-dream-notice { background: rgba(239, 68, 68, 0.1); color: #ef4444; padding: 15px; border-radius: 8px; font-size: 14px; font-weight: 700; margin-bottom: 15px; border-left: 4px solid #ef4444; white-space: pre-wrap; line-height: 1.6; }
    .c-dream-item { position: relative; border-radius: 10px; overflow: hidden; background: var(--c-panel); display: flex; flex-direction: column; min-height: 110px; padding: 20px; height: 100%; justify-content: center; }
    .c-dream-bg-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0.4; z-index: 0; transition: opacity 0.3s; }
    .c-dream-content { position: relative; z-index: 1; display: flex; flex-direction: column; gap: 6px; }
    /* 배경이 진해졌으므로 가독성을 위해 흰색 그림자(테두리 효과) 추가 */
    .c-dream-name { font-size: 18px; font-weight: 900; color: var(--c-text); line-height: 1.4; text-shadow: -1px -1px 0 var(--c-bg), 1px -1px 0 var(--c-bg), -1px 1px 0 var(--c-bg), 1px 1px 0 var(--c-bg), 0px 0px 8px var(--c-bg); }
    .c-dream-char { font-size: 14px; font-weight: 800; color: var(--c-accent); text-shadow: -1px -1px 0 var(--c-bg), 1px -1px 0 var(--c-bg), -1px 1px 0 var(--c-bg), 1px 1px 0 var(--c-bg); }
    .c-dream-rel { font-size: 13px; font-weight: 600; color: var(--c-text-sub); text-shadow: -1px -1px 0 var(--c-bg), 1px -1px 0 var(--c-bg), -1px 1px 0 var(--c-bg), 1px 1px 0 var(--c-bg); }

    /* 출처 */
    .c-credit { text-align: right; font-size: 11px; color: var(--c-text-sub); opacity: 0.6; font-weight: 700; margin-top: 20px; }
</style>
</head>
<body>

<div class="app-wrap">
    <aside class="sidebar">
        <div class="header">
            <h1>메인트 제작기</h1>
            <button class="ui-toggle" id="btn-mode" onclick="toggleUIMode()">다크 모드</button>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(this, 'profile')">프로필</button>
            <button class="tab-btn" onclick="switchTab(this, 'prop')">성향</button>
            <button class="tab-btn" onclick="switchTab(this, 'comm')">커뮤</button>
            <button class="tab-btn" onclick="switchTab(this, 'genre')">장르</button>
            <button class="tab-btn" onclick="switchTab(this, 'dream')">드림</button>
            <button class="tab-btn" onclick="switchTab(this, 'theme')">꾸미기</button>
        </div>

        <div class="panels">
            <div id="panel-profile" class="panel active">
                <label style="display:flex; align-items:center; gap:8px; font-size:13px; font-weight:700; color:var(--primary); background:rgba(59, 130, 246, 0.1); padding:12px; border-radius:8px; cursor:pointer;">
                    <input type="checkbox" id="in-show-profile" checked onchange="update()"> 윗부분 (프로필/소개/지뢰) 영역 표시하기
                </label>
                <div style="font-size:11px; color:var(--ui-text-dim); margin-top:-10px;">체크를 해제하면 장르/드림만 남겨 여러 장으로 저장할 수 있습니다.</div>
                
                <div class="form-group" style="margin-top:10px;">
                    <label>상단 배경 배너 (이미지 주소)</label>
                    <input type="url" id="in-banner" placeholder="이미지 주소를 붙여넣으세요" oninput="update()">
                </div>
                <div class="form-group">
                    <label>프로필 사진 (이미지 주소)</label>
                    <input type="url" id="in-pfp" placeholder="이미지 주소를 붙여넣으세요" oninput="update()">
                </div>
                <div class="row">
                    <div class="form-group" style="flex:1;"><label>닉네임</label><input type="text" id="in-name" value="닉네임" oninput="update()"></div>
                    <div class="form-group" style="flex:1;"><label>아이디</label><input type="text" id="in-id" value="@ID_ACCOUNT" oninput="update()"></div>
                </div>
                <div class="form-group">
                    <label>연령 / 기본 정보 (쉼표로 구분)</label>
                    <input type="text" id="in-age" placeholder="20대, 직장인, KST" oninput="update()">
                </div>
                <div class="form-group">
                    <label>주력 활동 (쉼표로 구분)</label>
                    <input type="text" id="in-main" placeholder="그림, 글쓰기" oninput="update()">
                </div>
                <div class="form-group"><label>자기소개 (자유 서술 / 줄바꿈 가능)</label><textarea id="in-bio" oninput="update()" style="height:80px;">안녕하세요! 잘 부탁드립니다.</textarea></div>
                <div class="form-group">
                    <label>지뢰 (보기에 불편한 것, 싫어하는 것)</label>
                    <textarea id="in-mine" oninput="update()" style="height:60px;" placeholder="보기에 불편하거나 배척하는 요소를 작성해주세요. (줄바꿈 가능)"></textarea>
                </div>
            </div>

            <div id="panel-prop" class="panel">
                <label style="font-size:12px; font-weight:800; color:var(--ui-text-dim);">기본 성향</label>
                <div class="tag-grid" id="prop-buttons"></div>
                <div class="form-group" style="margin-top:10px;">
                    <label>직접 입력 (쉼표로 구분)</label>
                    <input type="text" id="in-prop-custom" placeholder="FUB 자유, 겹트친 환영" oninput="update()">
                </div>
            </div>

            <div id="panel-comm" class="panel">
                <div class="form-group">
                    <label>자캐 커뮤니티 주의사항</label>
                    <textarea id="in-comm-notice" oninput="update()" style="height:50px;" placeholder="커뮤 관련 주의사항이나 성향을 적어주세요."></textarea>
                </div>
                <label style="font-size:12px; font-weight:800; color:var(--ui-text-dim); margin-top:5px;">주력 장르 선택</label>
                <div class="tag-grid" id="comm-buttons"></div>
                <div class="form-group" style="margin-top:5px;">
                    <label>기타 장르 (쉼표로 구분하여 직접 입력)</label>
                    <input type="text" id="in-comm-custom" placeholder="마법소녀, 아포칼립스" oninput="update()">
                </div>

                <hr style="border:0; border-bottom:1px solid var(--ui-border); margin: 10px 0;">

                <div class="form-group">
                    <label>오너 주의사항</label>
                    <textarea id="in-owner-notice" oninput="update()" style="height:50px;" placeholder="오너 관련 주의사항을 적어주세요."></textarea>
                </div>

                <label style="font-size:12px; font-weight:800; color:var(--ui-text-dim); margin-top:5px;">연성 종류</label>
                <div class="tag-grid" id="owner-creation-buttons"></div>
                <div class="form-group" style="margin-top:5px;">
                    <label>기타 연성 (쉼표로 구분)</label>
                    <input type="text" id="in-owner-creation-custom" placeholder="기타 연성" oninput="update()">
                </div>

                <label style="font-size:12px; font-weight:800; color:var(--ui-text-dim); margin-top:10px;">교류 수단</label>
                <div class="tag-grid" id="owner-contact-buttons"></div>
                <div class="form-group" style="margin-top:5px;">
                    <label>기타 교류 (쉼표로 구분)</label>
                    <input type="text" id="in-owner-contact-custom" placeholder="기타 교류 수단" oninput="update()">
                </div>
            </div>

            <div id="panel-genre" class="panel">
                <div id="genre-list" style="display:flex; flex-direction:column; gap:10px;"></div>
                <button class="tag-btn" style="border-style:dashed; padding:12px;" onclick="addGenre()">+ 장르 추가</button>
            </div>

            <div id="panel-dream" class="panel">
                <div class="form-group">
                    <label>섹션 제목</label>
                    <input type="text" id="in-dream-title" value="드림" placeholder="캐릭터 소개 등" oninput="update()">
                </div>
                <div class="form-group">
                    <label>드림 주의사항 (줄바꿈 가능)</label>
                    <textarea id="in-dream-notice" placeholder="겹드림 배척 등&#10;줄바꿈이 가능합니다." oninput="update()" style="height: 60px;"></textarea>
                </div>
                <div id="dream-list" style="display:flex; flex-direction:column; gap:10px; margin-top:5px;"></div>
                <button class="tag-btn" style="border-style:dashed; padding:12px;" onclick="addDream()">+ 드림(캐릭터) 추가</button>
            </div>

            <div id="panel-theme" class="panel">
                <div class="row">
                    <div class="form-group" style="flex:1;">
                        <label>레이아웃 (가로/세로)</label>
                        <select id="in-layout" onchange="updateLayout()">
                            <option value="horizontal">가로형 (트위터 권장)</option>
                            <option value="portrait">세로형 (모바일 폰 권장)</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label>글꼴 (폰트)</label>
                        <select id="in-font" onchange="updateFont()">
                            <option value="'Pretendard', sans-serif">프리텐다드 (기본)</option>
                            <option value="'Gowun Dodum', sans-serif">고운돋움 (정갈한)</option>
                            <option value="'Hi Melody', cursive">하이멜로디 (손글씨)</option>
                        </select>
                    </div>
                </div>

                <div class="row" style="margin-top: 5px;">
                    <div class="form-group" style="flex:1;">
                        <label>구분선 디자인</label>
                        <select id="in-divider" onchange="update()">
                            <option value="solid">기본 실선</option>
                            <option value="dashed">점선 (대시)</option>
                            <option value="icon">반짝이 (✦ ✦ ✦)</option>
                            <option value="wave">물결선 (〰〰〰)</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label>프로필 프레임</label>
                        <select id="in-frame" onchange="update()">
                            <option value="default">둥근 사각형</option>
                            <option value="circle">완전한 원형</option>
                            <option value="polaroid">폴라로이드 프레임</option>
                        </select>
                    </div>
                </div>

                <label style="font-size:12px; font-weight:800; color:var(--ui-text-dim); margin-top:10px;">테마 색상 (총 12종)</label>
                <div class="theme-grid">
                    <div class="theme-item active" style="background:#ffffff; color:#0f172a; border-color:#3b82f6;" onclick="setTheme(this, '#ffffff', '#f8fafc', '#0f172a', '#3b82f6')">화이트 (기본)</div>
                    <div class="theme-item" style="background:#fff9db; color:#856404; border-color:#fab005;" onclick="setTheme(this, '#fffdf0', '#fff9db', '#856404', '#fab005')">웜 베이지</div>
                    <div class="theme-item" style="background:#1e293b; color:#f8fafc; border-color:#8b5cf6;" onclick="setTheme(this, '#0f172a', '#1e293b', '#f8fafc', '#8b5cf6')">다크 네이비</div>
                    <div class="theme-item" style="background:#fff0f6; color:#a61e4d; border-color:#f06595;" onclick="setTheme(this, '#fff9fb', '#fff0f6', '#a61e4d', '#f06595')">블러쉬 핑크</div>
                    <div class="theme-item" style="background:#e0f2fe; color:#0369a1; border-color:#0ea5e9;" onclick="setTheme(this, '#f0f9ff', '#e0f2fe', '#0369a1', '#0ea5e9')">스카이 블루</div>
                    <div class="theme-item" style="background:#dcfce7; color:#14532d; border-color:#22c55e;" onclick="setTheme(this, '#f0fdf4', '#dcfce7', '#14532d', '#22c55e')">민트 그린</div>
                    <div class="theme-item" style="background:#f5f3ff; color:#4c1d95; border-color:#8b5cf6;" onclick="setTheme(this, '#faf5ff', '#f5f3ff', '#4c1d95', '#8b5cf6')">라벤더 퍼플</div>
                    <div class="theme-item" style="background:#ffe4e6; color:#881337; border-color:#e11d48;" onclick="setTheme(this, '#fff5f5', '#ffe4e6', '#881337', '#e11d48')">피치 코랄</div>
                    <div class="theme-item" style="background:#f1f3f5; color:#212529; border-color:#868e96;" onclick="setTheme(this, '#f8f9fa', '#f1f3f5', '#212529', '#868e96')">애쉬 그레이</div>
                    <div class="theme-item" style="background:#fef08a; color:#713f12; border-color:#eab308;" onclick="setTheme(this, '#fffff0', '#fef08a', '#713f12', '#eab308')">레몬 옐로우</div>
                    <div class="theme-item" style="background:#ecfccb; color:#3f6212; border-color:#84cc16;" onclick="setTheme(this, '#f7fee7', '#ecfccb', '#3f6212', '#84cc16')">말차 그린</div>
                    <div class="theme-item" style="background:#2b2b2b; color:#d4af37; border-color:#d4af37;" onclick="setTheme(this, '#1a1a1a', '#2b2b2b', '#d4af37', '#d4af37')">딥 블랙</div>
                    <div class="theme-item" style="grid-column: span 2; background:var(--ui-bg); color:var(--ui-text);" onclick="toggleColorPicker(this)">+ 직접 지정</div>
                </div>

                <div class="color-picker-wrap" id="color-picker-area">
                    <div class="color-row"><span>바탕색</span><input type="color" id="cp-bg" value="#ffffff" onchange="applyCustomColor()"></div>
                    <div class="color-row"><span>박스색</span><input type="color" id="cp-panel" value="#f8fafc" onchange="applyCustomColor()"></div>
                    <div class="color-row"><span>글자색</span><input type="color" id="cp-text" value="#0f172a" onchange="applyCustomColor()"></div>
                    <div class="color-row"><span>포인트색</span><input type="color" id="cp-accent" value="#3b82f6" onchange="applyCustomColor()"></div>
                </div>

                <div class="form-group" style="margin-top:10px;"><label>출처 (워터마크)</label><input type="text" id="in-credit" placeholder="@아이디" oninput="update()"></div>
            </div>
        </div>

        <button class="btn-primary" onclick="saveImage()">⬇ 고화질 이미지 저장</button>
    </aside>

    <main class="preview-wrap">
        <div id="render-target">            
            <div class="c-content-wrap">
                
                <div id="section-profile-wrap">
                    <div class="c-banner" id="out-banner"></div>
                    <div class="c-profile-row">
                        <div class="c-pfp-wrapper" id="out-pfp"></div>
                        <div class="c-profile-info">
                            <div class="c-name" id="out-name">닉네임</div>
                            <div class="c-id" id="out-id">@ID_ACCOUNT</div>
                        </div>
                    </div>

                    <div style="padding: 0 40px 10px 40px; display: flex; flex-direction: column; gap: 20px;">
                        <div class="c-badges" id="out-badges"></div>
                        <div class="c-bio-clean" id="out-bio"></div>
                        <div class="c-mine-box" id="out-mine-wrap" style="display:none;">
                            <div class="c-mine-title">⚠ 지뢰</div>
                            <div id="out-mine"></div>
                        </div>
                    </div>
                </div>

                <div class="c-body" id="section-main-body">
                    <div class="c-props-sec" id="sec-account-prop">
                        <div class="c-sec-label">계정 성향</div>
                        <div class="c-tags-wrap" id="out-props"></div>
                    </div>

                    <div id="sec-comm" style="display:none; flex-direction:column; gap:10px; margin-top:10px;">
                        <div class="c-divider div-solid"></div>
                        <div class="c-props-sec">
                            <div class="c-sec-label">커뮤 성향</div>
                            <div class="c-comm-notice" id="out-comm-notice"></div>
                            <div class="c-tags-wrap" id="out-comm-tags"></div>
                        </div>
                        
                        <div class="c-props-sec" id="sec-owner" style="display:none; margin-top:5px;">
                            <div class="c-sec-label">오너 성향</div>
                            <div class="c-comm-notice" id="out-owner-notice"></div>
                            <div class="c-tags-wrap" id="out-owner-tags"></div>
                        </div>
                    </div>

                    <div id="sec-genre">
                        <div class="c-divider div-solid"></div>
                        <div class="c-section-title">관심 장르</div>
                        <div class="c-list-grid" id="out-genres"></div>
                    </div>

                    <div id="sec-dream">
                        <div class="c-divider div-solid"></div>
                        <div class="c-section-title" id="out-dream-title-text">드림</div> 
                        <div id="out-dream-notice"></div>
                        <div class="c-list-grid" id="out-dreams"></div>
                    </div>

                    <div class="c-credit" id="out-credit"></div>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    // 버튼 설정
    const defaultProps = ['RT', '마음', '구독', '연성', '썰놀', '일상', '욕', '우울', '탐대'];
    let selectedProps = new Set();
    
    const defaultCommProps = ['일상힐링', '극시리', '성장', '약시리', '데스게임', '15세', '성인', '장르기반커'];
    let selectedCommProps = new Set();
    
    const defaultOwnerCreation = ['썰놀', '글', '그림', '만화', '역극', '커미션'];
    let selectedOwnerCreation = new Set();

    const defaultOwnerContact = ['탐대', 'DM', '멘션', '디스코드', '오픈채팅', '밴드'];
    let selectedOwnerContact = new Set();
    
    let genres = [];
    let dreams = [];

    function initButtons(containerId, dataArr, setObj) {
        const container = document.getElementById(containerId);
        dataArr.forEach(p => {
            const btn = document.createElement('div');
            btn.className = 'tag-btn';
            btn.innerText = p;
            btn.onclick = () => {
                btn.classList.toggle('active');
                setObj.has(p) ? setObj.delete(p) : setObj.add(p);
                update();
            };
            container.appendChild(btn);
        });
    }

    initButtons('prop-buttons', defaultProps, selectedProps);
    initButtons('comm-buttons', defaultCommProps, selectedCommProps);
    initButtons('owner-creation-buttons', defaultOwnerCreation, selectedOwnerCreation);
    initButtons('owner-contact-buttons', defaultOwnerContact, selectedOwnerContact);

    function toggleUIMode() {
        const html = document.documentElement;
        const btn = document.getElementById('btn-mode');
        if (html.getAttribute('data-ui-mode') === 'light') {
            html.setAttribute('data-ui-mode', 'dark');
            btn.innerText = '라이트 모드';
        } else {
            html.setAttribute('data-ui-mode', 'light');
            btn.innerText = '다크 모드';
        }
    }

    function switchTab(btn, id) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`panel-${id}`).classList.add('active');
    }

    function updateFont() {
        document.documentElement.style.setProperty('--c-font', document.getElementById('in-font').value);
    }
    
    function updateLayout() {
        const layout = document.getElementById('in-layout').value;
        const target = document.getElementById('render-target');
        if(layout === 'portrait') target.classList.add('layout-portrait');
        else target.classList.remove('layout-portrait');
    }

    function setTheme(el, bg, panel, text, accent) {
        document.querySelectorAll('.theme-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('color-picker-area').style.display = 'none';

        const r = document.documentElement;
        r.style.setProperty('--c-bg', bg);
        r.style.setProperty('--c-panel', panel);
        r.style.setProperty('--c-text', text);
        r.style.setProperty('--c-accent', accent);
        r.style.setProperty('--c-text-sub', (text === '#f8fafc' || text === '#d4af37' || text === '#f1f3f5') ? '#94a3b8' : '#64748b');
    }

    function toggleColorPicker(el) {
        document.querySelectorAll('.theme-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('color-picker-area').style.display = 'flex';
        applyCustomColor();
    }

    function applyCustomColor() {
        const r = document.documentElement;
        r.style.setProperty('--c-bg', document.getElementById('cp-bg').value);
        r.style.setProperty('--c-panel', document.getElementById('cp-panel').value);
        r.style.setProperty('--c-text', document.getElementById('cp-text').value);
        r.style.setProperty('--c-accent', document.getElementById('cp-accent').value);
        r.style.setProperty('--c-text-sub', document.getElementById('cp-text').value); 
    }

    function addGenre() { genres.push({ img: '', name: '', sub: '' }); renderEditor('genre', genres); update(); }
    function addDream() { dreams.push({ img: '', name: '', char: '', rel: '' }); renderEditor('dream', dreams); update(); }

    function renderEditor(type, dataArr) {
        const container = document.getElementById(`${type}-list`);
        container.innerHTML = '';
        dataArr.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = 'editor-item';
            if (type === 'genre') {
                div.innerHTML = `
                    <button class="remove-btn" onclick="genres.splice(${i},1);renderEditor('genre', genres);update()">✕</button>
                    <input type="url" placeholder="장르 이미지 주소 (미입력 시 이미지칸 출력 안 됨)" value="${item.img}" oninput="genres[${i}].img=this.value;update()">
                    <input type="text" placeholder="장르명" value="${item.name}" oninput="genres[${i}].name=this.value;update()">
                    <input type="text" placeholder="설명 (최애 등)" value="${item.sub}" oninput="genres[${i}].sub=this.value;update()">
                `;
            } else {
                div.innerHTML = `
                    <button class="remove-btn" onclick="dreams.splice(${i},1);renderEditor('dream', dreams);update()">✕</button>
                    <input type="url" placeholder="배경 이미지 주소" value="${item.img}" oninput="dreams[${i}].img=this.value;update()">
                    <input type="text" placeholder="이름 (캐릭터/장르)" value="${item.name}" oninput="dreams[${i}].name=this.value;update()">
                    <div style="display:flex; gap:10px;">
                        <input type="text" placeholder="상세 (캐릭터명 등)" value="${item.char}" oninput="dreams[${i}].char=this.value;update()">
                        <input type="text" placeholder="관계" value="${item.rel}" oninput="dreams[${i}].rel=this.value;update()">
                    </div>
                `;
            }
            container.appendChild(div);
        });
    }

    function update() {
        // 프로필 영역 표시 토글
        const showProfile = document.getElementById('in-show-profile').checked;
        const profileWrap = document.getElementById('section-profile-wrap');
        const mainBody = document.getElementById('section-main-body');
        
        if (showProfile) {
            profileWrap.style.display = 'block';
            mainBody.style.paddingTop = '20px';
        } else {
            profileWrap.style.display = 'none';
            mainBody.style.paddingTop = '40px';
        }

        // 이미지 렌더링
        const bannerUrl = document.getElementById('in-banner').value;
        const bannerDiv = document.getElementById('out-banner');
        bannerDiv.style.backgroundImage = bannerUrl ? `url(${bannerUrl})` : 'none';

        // 프로필 프레임 선택
        const pfpUrl = document.getElementById('in-pfp').value;
        const pfpDiv = document.getElementById('out-pfp');
        pfpDiv.style.backgroundImage = pfpUrl ? `url(${pfpUrl})` : 'none';
        
        const frameVal = document.getElementById('in-frame').value;
        pfpDiv.className = 'c-pfp-wrapper'; // reset class
        if (frameVal === 'circle') pfpDiv.classList.add('frame-circle');
        if (frameVal === 'polaroid') pfpDiv.classList.add('frame-polaroid');

        // 구분선 디자인 변경
        const divVal = document.getElementById('in-divider').value;
        document.querySelectorAll('.c-divider').forEach(el => {
            el.className = 'c-divider'; // class reset
            if (divVal === 'solid') el.classList.add('div-solid');
            if (divVal === 'dashed') el.classList.add('div-dashed');
            if (divVal === 'icon') el.classList.add('div-icon');
            if (divVal === 'wave') el.classList.add('div-wave');
        });

        // 텍스트 렌더링
        document.getElementById('out-name').innerText = document.getElementById('in-name').value || '닉네임';
        document.getElementById('out-id').innerText = document.getElementById('in-id').value || '@ID_ACCOUNT';
        
        const bioText = document.getElementById('in-bio').value;
        const bioBox = document.getElementById('out-bio');
        bioBox.innerText = bioText;
        bioBox.style.display = bioText ? 'block' : 'none';
        
        // 지뢰 (Mine)
        const mineText = document.getElementById('in-mine').value;
        const mineWrap = document.getElementById('out-mine-wrap');
        document.getElementById('out-mine').innerText = mineText;
        mineWrap.style.display = mineText ? 'block' : 'none';

        // 출처 워터마크
        document.getElementById('out-credit').innerText = document.getElementById('in-credit').value;

        // 배지 렌더링
        const badgeWrap = document.getElementById('out-badges');
        badgeWrap.innerHTML = '';
        const ages = document.getElementById('in-age').value.split(',').map(s => s.trim()).filter(s => s);
        ages.forEach(a => { badgeWrap.innerHTML += `<span class="c-badge">${a}</span>`; });
        const mains = document.getElementById('in-main').value.split(',').map(s => s.trim()).filter(s => s);
        mains.forEach(m => { badgeWrap.innerHTML += `<span class="c-badge" style="color:var(--c-accent);">${m}</span>`; });

        // 계정 성향 렌더링 및 자동 숨김
        const secAccountProp = document.getElementById('sec-account-prop');
        const propsWrap = document.getElementById('out-props');
        propsWrap.innerHTML = '';
        const customProps = document.getElementById('in-prop-custom').value.split(',').map(s => s.trim()).filter(s => s);
        
        if (selectedProps.size === 0 && customProps.length === 0) {
            secAccountProp.style.display = 'none';
        } else {
            secAccountProp.style.display = 'flex';
            selectedProps.forEach(p => { propsWrap.innerHTML += `<span class="c-tag">${p}</span>`; });
            customProps.forEach(p => { propsWrap.innerHTML += `<span class="c-tag">${p}</span>`; });
        }

        // 커뮤 성향 렌더링
        const secComm = document.getElementById('sec-comm');
        const commNoticeText = document.getElementById('in-comm-notice').value;
        const commNoticeBox = document.getElementById('out-comm-notice');
        const commTagsWrap = document.getElementById('out-comm-tags');
        
        commTagsWrap.innerHTML = '';
        selectedCommProps.forEach(p => { commTagsWrap.innerHTML += `<span class="c-tag comm">${p}</span>`; });
        const customCommProps = document.getElementById('in-comm-custom').value.split(',').map(s => s.trim()).filter(s => s);
        customCommProps.forEach(p => { commTagsWrap.innerHTML += `<span class="c-tag comm">${p}</span>`; });

        if (!commNoticeText && selectedCommProps.size === 0 && customCommProps.length === 0) {
            commNoticeBox.style.display = 'none';
            commTagsWrap.style.display = 'none';
            secComm.style.display = 'none';
        } else {
            secComm.style.display = 'flex';
            commNoticeBox.innerText = commNoticeText;
            commNoticeBox.style.display = commNoticeText ? 'block' : 'none';
            commTagsWrap.style.display = (selectedCommProps.size > 0 || customCommProps.length > 0) ? 'flex' : 'none';
        }

        // 오너 성향 렌더링
        const secOwner = document.getElementById('sec-owner');
        const ownerNoticeText = document.getElementById('in-owner-notice').value;
        const ownerNoticeBox = document.getElementById('out-owner-notice');
        const ownerTagsWrap = document.getElementById('out-owner-tags');
        
        ownerTagsWrap.innerHTML = '';
        let creationArr = Array.from(selectedOwnerCreation).concat(document.getElementById('in-owner-creation-custom').value.split(',').map(s=>s.trim()).filter(s=>s));
        let contactArr = Array.from(selectedOwnerContact).concat(document.getElementById('in-owner-contact-custom').value.split(',').map(s=>s.trim()).filter(s=>s));

        if (creationArr.length > 0) {
            ownerTagsWrap.innerHTML += `<span style="font-size:12px; font-weight:900; color:var(--c-accent); align-self:center; margin-right:4px;">연성</span>`;
            creationArr.forEach(p => { ownerTagsWrap.innerHTML += `<span class="c-tag comm">${p}</span>`; });
        }
        if (contactArr.length > 0) {
            ownerTagsWrap.innerHTML += `<span style="font-size:12px; font-weight:900; color:var(--c-accent); align-self:center; margin-left:8px; margin-right:4px;">교류</span>`;
            contactArr.forEach(p => { ownerTagsWrap.innerHTML += `<span class="c-tag comm">${p}</span>`; });
        }

        if (!ownerNoticeText && creationArr.length === 0 && contactArr.length === 0) {
            secOwner.style.display = 'none';
        } else {
            secOwner.style.display = 'flex';
            secComm.style.display = 'flex'; 
            ownerNoticeBox.innerText = ownerNoticeText;
            ownerNoticeBox.style.display = ownerNoticeText ? 'block' : 'none';
            ownerTagsWrap.style.display = (creationArr.length > 0 || contactArr.length > 0) ? 'flex' : 'none';
        }

        // 장르 렌더링 및 자동 숨김
        const secGenre = document.getElementById('sec-genre');
        const outGenres = document.getElementById('out-genres');
        outGenres.innerHTML = '';
        const validGenres = genres.filter(g => g.img.trim() || g.name.trim() || g.sub.trim());

        if(validGenres.length === 0) { 
            secGenre.style.display = 'none'; 
        } else {
            secGenre.style.display = 'block';
            validGenres.forEach(g => {
                const imgBoxHtml = g.img ? `<div class="c-genre-img-box" style="background-image: url('${g.img}');"></div>` : '';
                outGenres.innerHTML += `
                    <div class="c-genre-item">
                        ${imgBoxHtml}
                        <div class="c-genre-info">
                            <div class="c-genre-name">${g.name || '-'}</div>
                            <div class="c-genre-sub">${g.sub || ''}</div>
                        </div>
                    </div>
                `;
            });
        }

        // 드림 제목, 렌더링 및 자동 숨김
        const customDreamTitle = document.getElementById('in-dream-title').value;
        document.getElementById('out-dream-title-text').innerText = customDreamTitle || '드림';

        const secDream = document.getElementById('sec-dream');
        const outDreams = document.getElementById('out-dreams');
        const noticeVal = document.getElementById('in-dream-notice').value;
        const noticeBox = document.getElementById('out-dream-notice');
        
        outDreams.innerHTML = '';
        const validDreams = dreams.filter(d => d.img.trim() || d.name.trim() || d.char.trim() || d.rel.trim());
        
        if(validDreams.length === 0 && !noticeVal) { 
            secDream.style.display = 'none'; 
        } else {
            secDream.style.display = 'block';
            if(noticeVal) { noticeBox.innerHTML = `<div class="c-dream-notice">${noticeVal}</div>`; } 
            else { noticeBox.innerHTML = ''; }

            validDreams.forEach(d => {
                const bgStyle = d.img ? `background-image: url('${d.img}');` : '';
                outDreams.innerHTML += `
                    <div class="c-dream-item">
                        <div class="c-dream-bg-img" style="${bgStyle}"></div>
                        <div class="c-dream-content">
                            <div class="c-dream-name">${d.name || '-'}</div>
                            ${d.char ? `<div class="c-dream-char">${d.char}</div>` : ''}
                            <div class="c-dream-rel">${d.rel || ''}</div>
                        </div>
                    </div>
                `;
            });
        }
    }

    function saveImage() {
        const target = document.getElementById('render-target');
        setTimeout(() => {
            html2canvas(target, {
                scale: 3, 
                useCORS: true,
                allowTaint: true,
                backgroundColor: null
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `maint_maker_${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
            });
        }, 500); 
    }

    // 초기 실행
    addGenre();
    update();
</script>
</body>
</html>
